<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>404 - 页面未找到</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 62.5%; }

    body {
      font-family: "Helvetica Neue", Helvetica, "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑",
                   Arial, sans-serif;
      font-size: 1.4rem;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('/images/cover2.webp') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 0;
    }

    .error-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-family: "Titillium Web", "PingFang SC", "Hiragino Sans GB",
                   "Microsoft JhengHei", "Microsoft YaHei",
                   Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #fff;
      opacity: 0.95;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
      margin-bottom: 1rem;
      user-select: none;
    }

    .error-message {
      font-size: 2.4rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      margin: 0.5rem 0;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
    }

    .error-description {
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.8;
      margin: 0.8rem 0 2.5rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 1.4rem;
      font-weight: 500;
      text-decoration: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.3s ease-in-out;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .quick-nav {
      margin-top: 1.5rem;
      font-size: 1.2rem;
    }

    .quick-nav a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .quick-nav a:hover {
      color: #fff;
    }

    .nav-divider {
      margin: 0 0.6rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .error-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      text-align: center;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.35);
      z-index: 1;
    }

    .error-footer a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .error-footer a:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    @media (max-width: 768px) {
      .error-code { font-size: 4.5rem; }
      .error-message { font-size: 2rem; }
      .error-description { font-size: 1.3rem; }
    }

    @media (max-width: 480px) {
      .error-content { padding: 1.5rem; }
      .error-code { font-size: 4rem; }
      .error-message { font-size: 1.8rem; }
      .home-btn { padding: 10px 22px; font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="error-content">
    <div class="error-code">404</div>
    <p class="error-message">页面未找到</p>
    <p class="error-description">
      你访问的页面不存在或已被移除。<br>
      The page you're looking for doesn't exist.
    </p>
    <a href="/" class="home-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path d="M19 21H5a1 1 0 0 1-1-1v-9H1l10.327-9.388a1 1 0 0 1 1.346 0L23 11h-3v9a1 1 0 0 1-1 1zm-6-2h5V9.157l-6-5.454-6 5.454V19h5v-6h2v6z"/>
      </svg>
      返回首页
    </a>
    <nav class="quick-nav">
      <a href="/archives">全部文章</a>
      <span class="nav-divider">·</span>
      <a href="/categories">文章分类</a>
      <span class="nav-divider">·</span>
      <a href="/about">关于本站</a>
    </nav>
  </div>
  <footer class="error-footer">
    &copy; 2022-2026 · <a href="/">Kaleid Scoper</a>
  </footer>
</body>
</html>
